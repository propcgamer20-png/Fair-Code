name: New audit proposal
description: I want to add a bias audit to the repo - claiming it here first
labels: ["audit"]
body:
  - type: markdown
    attributes:
      value: |
        Open this issue before doing any work. If two people are building the same audit at the same time, that's wasted effort.
        Check the [roadmap in the README](../blob/main/README.md#whats-next) and the open issues first.

  - type: input
    id: domain
    attributes:
      label: Domain
      description: What system or decision are you auditing?
      placeholder: e.g. HMDA mortgage lending, facial recognition, predictive policing
    validations:
      required: true

  - type: input
    id: dataset
    attributes:
      label: Dataset
      description: Name and source (Kaggle link, government portal, etc.)
      placeholder: e.g. HMDA 2022 public LAR - https://ffiec.cfpb.gov/data-browser/
    validations:
      required: true

  - type: dropdown
    id: dataset-public
    attributes:
      label: Is the dataset publicly accessible without login or payment?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: input
    id: protected-attribute
    attributes:
      label: Protected attribute(s)
      placeholder: e.g. Race, Gender, Age
    validations:
      required: true

  - type: textarea
    id: proxy-variables
    attributes:
      label: Suspected proxy variables
      description: What correlated features might smuggle the bias back in after you remove the protected attribute? You don't need to have confirmed these yet - just your hypothesis.
      placeholder: e.g. Census tract likely correlates with race due to residential segregation patterns
    validations:
      required: true

  - type: textarea
    id: real-world-context
    attributes:
      label: Real-world context
      description: Why does this audit matter? What decisions does this system affect, and who does it affect?
      placeholder: e.g. Mortgage lenders use automated underwriting systems for ~90% of decisions. The HMDA data shows...
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before you start
      options:
        - label: I've checked the README roadmap and open issues - this audit isn't already claimed or in progress
          required: true
        - label: The dataset is publicly available without login or payment
          required: true
        - label: The dataset contains real demographic data (not synthetic)
          required: true
        - label: My contribution is em-dash-free - I used hyphens ( - ) instead of em dashes (—) in all files
          required: true
