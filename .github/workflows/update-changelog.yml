name: Update Changelog

on:
  schedule:
    - cron: '30 18 * * *'  # every day at 12am IST
  workflow_dispatch:

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed

      - name: Append daily commits to CHANGELOG
        run: |
          SINCE=$(date -d '1 day ago' +%Y-%m-%d 2>/dev/null || date -v-1d +%Y-%m-%d)
          WEEK=$(date +%Y-%m-%d)
          LOG=$(git log --since="$SINCE" --pretty="- %s (%h)" --no-merges)

          if [ -z "$LOG" ]; then
            echo "No new commits this day, skipping."
            exit 0
          fi

          ENTRY="## $WEEK\n\n$LOG\n"
          # Insert after the first line (title) of CHANGELOG.md
          sed -i "2s/^/\n$ENTRY\n/" CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: daily changelog update [skip ci]"
          git push
